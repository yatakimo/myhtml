<!DOCTYPE html>
<html> 
<head>
    <meta charset="UTF-8">
    <title>HTML 練習</title>
    <style>
    .b {
        text-align: center;
        }
    </style>
</head>
<body>

    <div class="b">
        <h1>李白 月下獨酌</h1>
        花間一壺酒<BR>
            獨酌無雙親<BR>
    </div>
    <div class="b">
        <pre>
        李白 月下獨酌
        花間一壺酒
        獨酌無雙親
            </pre>
    </div>
    <div class="b">
        <h1>月下獨酌</h1>
        <P>花間一壺酒，獨酌無雙親，舉杯邀明月，對影成三人。</P>
        <HR>
            <section>
        <H1>靜夜思</H1>
        <P>床前明月光，疑是地上霜，舉頭望明月，低頭思故鄉</P>
            </section>
    </div>
    <div>
        <i><b>靜夜思</b></i>
    </div>
    <div>
        <b>好</b><!--粗體-->
        <i>好</i><!--斜體-->
        <cite>好</cite> <!--內容以斜體顯示-->
        <q>好</q> <!--內容前後加入引號-->
        <blockquote>好</blockquote>
        <mark>加入螢光劑中...</mark><!--加入網底-->
        <sup>好2</sup><!--上標-->
        <sub>好2</sub><!--下標-->
    </div>
    <div>
    <!--導師今日介紹，引用之前-->
<h1>表格範例</h1>
<h2>表格一(3x4)</h2>
<table border="1" width="60%">
    <tr>
        <td>(1.1)</td>
        <td>(1.2)</td>
        <td>(1.3)</td>
        <td>(1.4)</td>
    </tr>
        <td>(2.1)</td>
        <td>(2.2)</td>
        <td>(2.3)</td>
        <td>(2.4)</td>
    <tr>
        <td>(3.1)</td>
        <td>(3.2)</td>
        <td>(3.3)</td>
        <td>(3.4)</td>
    </tr>
</table>
    </div>
    <div>
        <thead>BBB</thead><!--表格表頭.<th>加粗-->
            <tbody>BB</tbody><!--表單身體-->
            <tfoot>BB</tfoot><!--表尾-->
    </div>
</body>
</html>
