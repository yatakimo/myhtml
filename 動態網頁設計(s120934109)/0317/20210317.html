<!DOCTYPE html>
<html> 
    <head>
            <meta charset="UTF-8">
            <title>0317練習-鄭翔文</title>
                </head>
    <style>
        div  {
                color:blue;
        }  
        #mainBody{
                color:red;
        }
        #def {
                color:green;
                border:2px solid #FFFF00;
                background-color: antiquewhite;
                width: 50%;
                float:left
        }
        #test{
                color:brown;
                border: 2px solid #00FFFF;
                background-color: chartreuse;
                width: 49%;
                float:right
        }

        </style>
    <body>
        <div id="mainBody">
            <div id="def">
                    <h1> DIV 定義和用法</h1>
            <ul>
                <li> div 標籤定義的區域 (區塊) 或HTML文檔中的一個部分。</li>
                <li> div 標籤作用為HTML元素的容器-然後使用CSS設置樣式或使用JavaScript對其進行操作。</li>
                <li> div 標籤可以很容易透過使用CSS中 class 和 id 定義與設定屬性風格。</li>
                <li>任何種類的內容都可以放在 div 標籤內！</li>
            </ul>
                    <p>注意：默認情況下，瀏覽器始終在 div 元素之前和之後放置換行符。</p>
                </div>
            <div id="test">
                    <h1>This is a heading</h1>
                    <p>This is a paragraph.</p>
                </div>
        </div>
    </body>
</html>
